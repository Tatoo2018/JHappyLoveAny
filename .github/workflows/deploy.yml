name: Build and Deploy Update Site

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**/*.md'
      - '.gitignore'

permissions:
  contents: write

  
env:
  # Git Hub Pagesに公開する対象フォルダ
  REPOSITORY_PATH: com.jhappy.jhappyloveany.updatesite/target/repository
  # VSCode クライアントのディレクトリ名
  VSCODE_CLIENT_PATH: com.jhappy.jhappyloveany.client.vscode
  # 成果物を一時的に集約するフォルダ
  DEPLOY_STAGING_DIR: deploy_staging

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: xvfb-run mvn clean verify
        env:
          # localのmacでテストを実行すると警告メッセージのようなものがでる。無視できるもだが、これを設定することでログが表示されるので念の為設定,GitHub上ではmacでテストしない限り関係ない
          CORESVG_VERBOSE: "1"
          # 巨大なEclipseリポジトリを解析すると解析可能な最大容量をこえるので、その設定をなしにリポジトリを使用可能にする
          MAVEN_OPTS: >-
            -Djdk.xml.maxGeneralEntitySizeLimit=0
            -Djdk.xml.totalEntitySizeLimit=0
            -Djdk.xml.entityExpansionLimit=0
      
      
      # --- 3. Node.js セットアップ (VSCode 用) ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.VSCODE_CLIENT_PATH }}/package.json

      # --- 4. VSCode VSIX パッケージング ---
      - name: Package VSCode Extension
        run: |
          # ビルド済みのJAR (LSP Server) を VSCode フォルダへコピー 
          mkdir -p ${{ env.VSCODE_CLIENT_PATH }}/server
          cp com.jhappy.jhappyloveany/target/*-jar-with-dependencies.jar ${{ env.VSCODE_CLIENT_PATH }}/server/com.jhappy.jhappyloveany-jar-with-dependencies.jar
          
          cd ${{ env.VSCODE_CLIENT_PATH }}
          npm install
          npm run package
          npx vsce package

      - name: 📄 Create Info HTML for Browser Access
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          HOME_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"
          TEMPLATE_PATH=".github/workflows/update-site-index.html"
          TARGET_PATH="${{ env.REPOSITORY_PATH }}/index.html"

          # テンプレートをコピーし、変数を sed で置換
          # {{REPO_NAME}} と {{HOME_URL}} を実際の実装値に書き換える
          cp $TEMPLATE_PATH $TARGET_PATH
          sed -i "s|{{REPO_NAME}}|$REPO_NAME|g" $TARGET_PATH
          sed -i "s|{{HOME_URL}}|$HOME_URL|g" $TARGET_PATH

      - name: 📄 Create VSCode Temp Folder
        run: |
          mkdir -p vsix_temp
          
          cp ${{ env.VSCODE_CLIENT_PATH }}/jhappy-lsp-client-*.vsix vsix_temp/

          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          HOME_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/"
          TEMPLATE_PATH=".github/workflows/vscode-site-index.html"
          TARGET_PATH="vsix_temp/index.html"
          VSIX_FILE=$(ls ${{ env.VSCODE_CLIENT_PATH }}/jhappy-lsp-client-*.vsix | xargs basename)

          # テンプレートをコピーして各変数を置換
          cp $TEMPLATE_PATH $TARGET_PATH
          sed -i "s|{{REPO_NAME}}|$REPO_NAME|g" $TARGET_PATH
          sed -i "s|{{HOME_URL}}|$HOME_URL|g" $TARGET_PATH
          sed -i "s|{{BRANCH_NAME}}|${{ github.ref_name }}|g" $TARGET_PATH
          sed -i "s|{{VSIX_FILE}}|$VSIX_FILE|g" $TARGET_PATH

      - name: Prepare Deployment Directory For EclipseSite
        run: |
          mkdir -p eclipsesite_tmp
          cp -r ${{ env.REPOSITORY_PATH }}/* eclipsesite_tmp/
      

      - name: Deploy Eclipse Update Site
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: eclipsesite_tmp
          branch: gh-pages
          target-folder: updatesite/${{ github.ref_name }} # ブランチごとのフォルダを指定
          clean: true 
          single-commit: true

      # Step B: VSCode VSIX のデプロイ
      - name: Deploy VSCode VSIX
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: vsix_temp
          branch: gh-pages
          target-folder: vscode/${{ github.ref_name }} # VSCodeもブランチごとに分ける
          clean: true
          single-commit: true
